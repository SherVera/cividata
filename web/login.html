<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Acceso — Censo / Registro</title>
<style>
  body{font-family:system-ui,sans-serif;background:#eef2f7;display:flex;min-height:100vh;align-items:center;justify-content:center;margin:0}
  form{background:#fff;padding:2rem;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.08);width:300px}
  h1{font-size:1.2rem;margin:0 0 1rem}
  input{width:100%;padding:.6rem;margin:.4rem 0;border:1px solid #cbd5e1;border-radius:8px;box-sizing:border-box}
  button{width:100%;padding:.6rem;background:#2563eb;color:#fff;border:0;border-radius:8px;font-size:1rem;cursor:pointer}
  .err{color:#dc2626;font-size:.85rem;min-height:1rem}
</style>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/icon.svg">
<link rel="icon" href="/icon.svg">
<link rel="stylesheet" href="/app.css">
</head>
<body>
<form id="f">
  <h1>📋 Censo / Registro — Acceso</h1>
  <input type="text" id="identidad" placeholder="Correo o teléfono" autocomplete="username" autofocus required>
  <input type="password" id="password" placeholder="Contraseña" autocomplete="current-password" required>
  <button type="submit">Entrar</button>
  <p class="err" id="e"></p>
</form>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
  const sb = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
  // Si ya hay sesión, al formulario.
  sb.auth.getSession().then(({ data }) => { if (data.session) location.replace('index.html'); });
  document.getElementById('f').addEventListener('submit', async (ev) => {
    ev.preventDefault();
    const id = document.getElementById('identidad').value.trim();
    const password = document.getElementById('password').value;
    // Si tiene "@" es correo; si no, se trata como teléfono (formato E.164: +<país><número>).
    const creds = id.includes('@')
      ? { email: id, password }
      : { phone: id.replace(/[\s-]/g, ''), password };
    const { error } = await sb.auth.signInWithPassword(creds);
    if (error) { document.getElementById('e').textContent = 'Credenciales incorrectas'; return; }
    location.replace('index.html');
  });
</script>
</body>
</html>
