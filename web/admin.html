<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Panel Admin — Censo / Registro</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/icon.svg">
<link rel="icon" href="/icon.svg">
<link rel="stylesheet" href="/app.css">
<style>
  /* La barra del admin usa el tono oscuro para diferenciarlo del resto. */
  .appbar.admin { background: var(--slate-900); border-bottom-color: var(--slate-900); }
  .appbar.admin .brand .title { color: #fff; }
  .appbar.admin .brand .subtitle { color: #94a3b8; }
  .appbar.admin .brand .logo { background: rgba(255,255,255,.12); }
  .appbar.admin .appbar-actions a { color: #cbd5e1; }
  .appbar.admin .appbar-actions a:hover { background: rgba(255,255,255,.1); color: #fff; }

  h2.sec { font-size: 1rem; font-weight: 700; color: var(--slate-700); margin: 1.6rem 0 .7rem; display: flex; align-items: center; gap: .45rem; }
  .table-wrap.compact { max-height: 46vh; }
  form.new {
    background: #fff; border: 1px solid var(--slate-200); border-radius: 16px;
    box-shadow: var(--shadow-sm); padding: 1.1rem 1.2rem;
    display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: .8rem; align-items: end;
  }
  form.new > div { display: flex; flex-direction: column; }
  form.new label {
    font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
    color: var(--slate-500); margin-bottom: .35rem; display: block;
  }
</style>
</head>
<body>
<header class="appbar admin">
  <div class="appbar-inner">
    <div class="brand">
      <span class="logo">🛠️</span>
      <div>
        <span class="title">Panel de Administración</span>
        <span class="subtitle">Gestión del sistema</span>
      </div>
    </div>
    <div class="appbar-actions">
      <a href="index.html">➕ Registrar</a>
      <a href="registros.html">📋 Registros</a>
      <a id="out">↩ Salir</a>
    </div>
  </div>
</header>

<main class="container">
  <h2 class="sec">📊 Estadísticas</h2>
  <div class="metrics" id="cards"></div>

  <h2 class="sec">👥 Registros por usuario</h2>
  <div class="table-wrap compact"><table id="porUsuario"></table></div>

  <h2 class="sec">🔐 Gestión de usuarios</h2>
  <p class="msg" id="msg"></p>
  <form class="new" id="newUser">
    <div><label>Correo (opcional)</label><input id="nEmail" type="email" placeholder="correo@ej.com"></div>
    <div><label>Teléfono (opcional, +E.164)</label><input id="nPhone" placeholder="+584141234567"></div>
    <div><label>Contraseña</label><input id="nPass" type="text" placeholder="mín. 6 caracteres"></div>
    <div><label>Rol</label><select id="nRole"><option value="registrador">Registrador</option><option value="admin">Admin</option></select></div>
    <div><button type="submit">＋ Crear usuario</button></div>
  </form>
  <div class="table-wrap compact" style="margin-top:.9rem"><table id="usuarios"></table></div>

  <h2 class="sec">🧾 Auditoría reciente (últimas 50 operaciones)</h2>
  <div class="table-wrap compact"><table id="audit"></table></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
  const sb = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
  let token = null;
  const esc = (v) => (v == null ? '' : String(v).replace(/</g, '&lt;'));

  async function api(method, body) {
    const r = await fetch('/api/users', {
      method,
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: body ? JSON.stringify(body) : undefined,
    });
    return r.json();
  }

  document.getElementById('out').onclick = async () => { await sb.auth.signOut(); location.replace('login.html'); };

  function identidad(u) { return u.email || u.phone || u.id.slice(0, 8); }

  async function cargarUsuarios() {
    const { users, error } = await api('GET');
    if (error) { document.getElementById('msg').textContent = 'Error: ' + error; return []; }
    const t = document.getElementById('usuarios');
    t.innerHTML = '<tr><th>Identidad</th><th>Rol</th><th>Estado</th><th>Último acceso</th><th>Acciones</th></tr>';
    for (const u of users) {
      const tr = document.createElement('tr');
      tr.innerHTML =
        `<td>${esc(u.email || u.phone)}</td>` +
        `<td><span class="badge ${u.role === 'admin' ? 'admin' : ''}">${u.role}</span></td>` +
        `<td><span class="badge ${u.disabled ? 'off' : ''}">${u.disabled ? 'deshabilitado' : 'activo'}</span></td>` +
        `<td>${u.last_sign_in_at ? new Date(u.last_sign_in_at).toLocaleString('es') : '—'}</td>`;
      const td = document.createElement('td');
      td.append(
        botón('✏️', 'Editar correo/teléfono', async () => {
          const email = prompt('Nuevo correo (vacío = no cambiar)', u.email || '');
          if (email === null) return;
          const phone = prompt('Nuevo teléfono +E.164 (vacío = no cambiar)', u.phone || '');
          if (phone === null) return;
          const body = { id: u.id, action: 'contact' };
          const e = email.trim(), p = phone.trim().replace(/[\s-]/g, '');
          if (e && e !== u.email) body.email = e;
          if (p && p !== u.phone) body.phone = p;
          if (!body.email && !body.phone) return;
          const r = await api('PATCH', body);
          if (r.error) flash('Error: ' + r.error); else { flash('Contacto actualizado'); cargarUsuarios(); }
        }),
        botón('🔑', 'Resetear contraseña', async () => {
          const p = prompt('Nueva contraseña para ' + identidad(u));
          if (p) { await api('PATCH', { id: u.id, action: 'reset', password: p }); flash('Contraseña actualizada'); }
        }),
        botón(u.disabled ? '✅' : '🚫', u.disabled ? 'Habilitar' : 'Deshabilitar', async () => {
          await api('PATCH', { id: u.id, action: u.disabled ? 'enable' : 'disable' });
          flash('Estado actualizado'); cargarUsuarios();
        }, u.disabled ? 's' : 's d'),
        botón(u.role === 'admin' ? '↓ registrador' : '↑ admin', 'Cambiar rol', async () => {
          await api('PATCH', { id: u.id, action: 'role', role: u.role === 'admin' ? 'registrador' : 'admin' });
          flash('Rol actualizado'); cargarUsuarios();
        })
      );
      tr.append(td);
      t.append(tr);
    }
    return users;
  }
  function botón(txt, title, fn, cls = 's') {
    const b = document.createElement('button');
    b.className = cls; b.textContent = txt; b.title = title;
    b.style.marginRight = '.3rem';
    b.onclick = fn;
    return b;
  }
  function flash(m) { const e = document.getElementById('msg'); e.textContent = m; setTimeout(() => (e.textContent = ''), 2500); }

  document.getElementById('newUser').addEventListener('submit', async (e) => {
    e.preventDefault();
    const body = {
      email: document.getElementById('nEmail').value.trim() || undefined,
      phone: document.getElementById('nPhone').value.trim().replace(/[\s-]/g, '') || undefined,
      password: document.getElementById('nPass').value,
      role: document.getElementById('nRole').value,
    };
    const r = await api('POST', body);
    if (r.error) { flash('Error: ' + r.error); return; }
    e.target.reset(); flash('Usuario creado'); cargarTodo();
  });

  async function cargarStats(users) {
    const mapU = Object.fromEntries(users.map((u) => [u.id, u.email || u.phone || u.id.slice(0, 8)]));
    const { data: regs } = await sb.from('citizens').select('created_by,created_at');
    const total = regs ? regs.length : 0;
    const semana = (regs || []).filter((r) => Date.now() - new Date(r.created_at).getTime() < 7 * 864e5).length;
    document.getElementById('cards').innerHTML =
      tarjeta(total, 'Registros totales') +
      tarjeta(semana, 'Últimos 7 días') +
      tarjeta(users.length, 'Usuarios') +
      tarjeta(users.filter((u) => u.role === 'admin').length, 'Administradores');

    const conteo = {};
    for (const r of regs || []) conteo[r.created_by] = (conteo[r.created_by] || 0) + 1;
    const filas = Object.entries(conteo).sort((a, b) => b[1] - a[1]);
    const t = document.getElementById('porUsuario');
    t.innerHTML = '<tr><th>Usuario</th><th>Registros</th></tr>' +
      (filas.length ? filas.map(([id, n]) => `<tr><td>${esc(mapU[id] || id)}</td><td>${n}</td></tr>`).join('')
                    : '<tr><td colspan="2">Sin registros aún</td></tr>');
  }
  const tarjeta = (n, l) => `<div class="card metric"><div class="l">${l}</div><div class="n">${n}</div></div>`;

  async function cargarAudit() {
    const { data, error } = await sb.from('audit_log').select('*').order('id', { ascending: false }).limit(50);
    const t = document.getElementById('audit');
    if (error) { t.innerHTML = '<tr><td>Error: ' + esc(error.message) + '</td></tr>'; return; }
    t.innerHTML = '<tr><th>Fecha</th><th>Acción</th><th>Registro #</th><th>Usuario</th></tr>' +
      (data.length ? data.map((a) =>
        `<tr><td>${new Date(a.created_at).toLocaleString('es')}</td><td>${esc(a.action)}</td><td>${esc(a.citizen_id)}</td><td>${esc(a.actor_email || a.actor)}</td></tr>`
      ).join('') : '<tr><td colspan="4">Sin operaciones aún</td></tr>');
  }

  async function cargarTodo() {
    const users = await cargarUsuarios();
    await cargarStats(users);
    await cargarAudit();
  }

  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) return location.replace('login.html');
    if (session.user.app_metadata?.role !== 'admin') return location.replace('index.html'); // solo admin
    token = session.access_token;
    cargarTodo();
  })();
</script>
<script src="/nav.js"></script>
</body>
</html>
