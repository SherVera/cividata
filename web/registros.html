<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Registros — Censo / Registro</title>
<style>
  body{font-family:system-ui,sans-serif;background:#eef2f7;margin:0;color:#1e293b}
  header{background:#2563eb;color:#fff;padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem}
  header a{color:#fff;text-decoration:none;font-size:.9rem;cursor:pointer}
  main{padding:1rem}
  table{border-collapse:collapse;width:100%;background:#fff;font-size:.82rem}
  th,td{border:1px solid #e2e8f0;padding:.4rem .6rem;text-align:left;white-space:nowrap}
  th{background:#f1f5f9;position:sticky;top:0}
  .wrap{overflow:auto;max-height:80vh;border-radius:10px}
  a.map{color:#2563eb}
  .count{color:#475569;margin:.5rem 0}
</style>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/icon.svg">
<link rel="icon" href="/icon.svg">
<link rel="stylesheet" href="/app.css">
</head>
<body>
<header>
  <strong>📋 Registros guardados</strong>
  <span><span id="adminwrap" style="display:none"><a href="admin.html">🛠️ Admin</a> &nbsp;·&nbsp; </span><a href="index.html">➕ Nuevo registro</a> &nbsp;·&nbsp; <a href="estadisticas.html">📊 Estadísticas</a> &nbsp;·&nbsp; <a id="out">Salir</a></span>
</header>
<main>
  <p class="count" id="count">Cargando…</p>
  <div class="wrap"><table id="t"></table></div>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
  const sb = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
  const COLS = [
    ['id','#'],['created_at','Fecha registro'],['first_name','Nombres'],['last_name','Apellidos'],
    ['birth_date','F. nac.'],['gender','Género'],['id_document','Documento'],['nationality','Nacionalidad'],
    ['city','Ciudad'],['state_province','Estado'],['contact_name','Representante'],['relationship','Parentesco'],
    ['phone_primary','Teléfono'],['email','Correo'],['vaccination','Vacunas'],['education_level','Nivel'],
    ['institution','Institución'],['geo','Ubicación reg.']
  ];
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) return location.replace('login.html');
    if (session.user.app_metadata?.role === 'admin') document.getElementById('adminwrap').style.display = 'inline';
    document.getElementById('out').onclick = async () => { await sb.auth.signOut(); location.replace('login.html'); };

    const { data: rows, error } = await sb.from('citizens').select('*').order('id', { ascending: false });
    if (error) { document.getElementById('count').textContent = 'Error: ' + error.message; return; }
    document.getElementById('count').textContent = rows.length + ' registro(s)';
    const t = document.getElementById('t');
    t.innerHTML = '<tr>' + COLS.map(c => `<th>${c[1]}</th>`).join('') + '</tr>';
    for (const r of rows) {
      const cells = COLS.map(([k]) => {
        if (k === 'geo') {
          return r.geo_lat != null
            ? `<td><a class="map" target="_blank" href="https://maps.google.com/?q=${r.geo_lat},${r.geo_lng}">${(+r.geo_lat).toFixed(4)}, ${(+r.geo_lng).toFixed(4)}</a></td>`
            : '<td>—</td>';
        }
        let v = r[k] == null ? '' : String(r[k]);
        if (k === 'created_at' && v) v = new Date(v).toLocaleString('es');
        return `<td>${v.replace(/</g,'&lt;')}</td>`;
      });
      t.insertAdjacentHTML('beforeend', '<tr>' + cells.join('') + '</tr>');
    }
  })();
</script>
<script src="/nav.js"></script>
</body>
</html>
