<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Estadísticas — Cividata</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/icon.svg">
<link rel="icon" href="/icon.svg">
<link rel="stylesheet" href="/app.css">
<style>
  .metric { flex-direction: row; align-items: center; justify-content: space-between; }
  .metric .ico { width: 48px; height: 48px; flex: none; display: grid; place-items: center; border-radius: 12px; font-size: 1.4rem; }
  .metric .ico.blue { background: var(--blue-50); }
  .metric .ico.green { background: var(--green-50); }
  .metric .ico.indigo { background: #eef2ff; }
  .metric .ico.rose { background: var(--rose-50); }
</style>
</head>
<body>
<header class="appbar">
  <div class="appbar-inner">
    <div class="brand">
      <span class="logo">📊</span>
      <div>
        <span class="title">Estadísticas generales</span>
        <span class="subtitle">Tablero del censo</span>
      </div>
    </div>
    <div class="appbar-actions">
      <span id="adminwrap" style="display:none"><a href="admin.html">🛠️ Admin</a></span>
      <a href="index.html">➕ Registrar</a>
      <a href="registros.html">📋 Registros</a>
      <a id="out">↩ Salir</a>
    </div>
  </div>
</header>

<main class="container narrow">
  <div class="page-head">
    <h2>Tablero de Estadísticas</h2>
    <p>Resumen general de los registros del censo.</p>
  </div>
  <p class="msg" id="msg">Cargando…</p>
  <div class="metrics" id="cards"></div>
</main>

<footer class="appfoot">
  <div class="line">🛡️ Cividata • Hospitalización Pediátrica</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
  const sb = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
  const card = (n, l, icon = '📈', color = 'blue') =>
    `<div class="metric"><div><div class="l">${l}</div><div class="n">${n}</div></div><div class="ico ${color}">${icon}</div></div>`;
  document.getElementById('out').onclick = async () => { await sb.auth.signOut(); location.replace('login.html'); };

  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) return location.replace('login.html');
    if (session.user.app_metadata?.role === 'admin') document.getElementById('adminwrap').style.display = 'inline';
    const { data, error } = await sb.rpc('general_stats');
    if (error) { document.getElementById('msg').textContent = 'Error: ' + error.message; return; }
    document.getElementById('msg').textContent = '';
    document.getElementById('cards').innerHTML =
      card(data.total, 'Registros totales', '👥', 'blue') +
      card(data.today, 'Hoy', '📅', 'green') +
      card(data.last7, 'Últimos 7 días', '📈', 'indigo') +
      card(data.mine, 'Mis registros', '🩺', 'rose');
  })();
</script>
<script src="/nav.js"></script>
</body>
</html>
