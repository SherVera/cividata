# Valida migraciones en PR: levanta Postgres local y aplica el historial completo.

name: Supabase migrations (check)

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
      - '.github/workflows/supabase-migrations-check.yml'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Start local database and apply migrations
        run: supabase db start

      - name: Lint migrations
        run: supabase db lint
