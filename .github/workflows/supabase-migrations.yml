# Aplica migraciones en Supabase PROD al mergear en main.
# Flujo: probar en dev → PR dev → main. Ver supabase-migrations-pr-guard.yml.
# Secrets (repo o Environment "prod"): SUPABASE_ACCESS_TOKEN, SUPABASE_PROD_PROJECT_ID, SUPABASE_PROD_DB_PASSWORD

name: Supabase migrations (production)

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
      - '.github/workflows/supabase-migrations.yml'
  workflow_dispatch:

concurrency:
  group: supabase-migrations-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: prod

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROD_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify secrets (prod)
        run: |
          missing=0
          if [[ -z "$SUPABASE_ACCESS_TOKEN" ]]; then
            echo "::error::Falta SUPABASE_ACCESS_TOKEN (repo → Settings → Secrets → Actions)."
            missing=1
          fi
          if [[ -z "$SUPABASE_PROJECT_ID" ]]; then
            echo "::error::Falta SUPABASE_PROD_PROJECT_ID (Environment prod o repo secrets)."
            missing=1
          fi
          if [[ -z "$SUPABASE_DB_PASSWORD" ]]; then
            echo "::error::Falta SUPABASE_PROD_DB_PASSWORD — contraseña Database de Supabase prod, no anon/service."
            missing=1
          fi
          if [[ "$missing" -eq 1 ]]; then exit 1; fi
          echo "Secrets prod OK (ref length ${#SUPABASE_PROJECT_ID})."

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link project (prod)
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Push migrations (prod)
        run: supabase db push --yes
