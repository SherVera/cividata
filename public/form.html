<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ficha de Registro / Censo Infantil</title>
<style>
  :root{--blue:#2563eb}
  *{box-sizing:border-box}
  body{font-family:system-ui,sans-serif;background:#eef2f7;margin:0;color:#1e293b}
  header{background:var(--blue);color:#fff;padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem}
  header a{color:#fff;text-decoration:none;font-size:.9rem;opacity:.9}
  main{max-width:780px;margin:1.5rem auto;padding:0 1rem}
  fieldset{background:#fff;border:1px solid #e2e8f0;border-radius:12px;margin-bottom:1.2rem;padding:1.2rem}
  legend{font-weight:700;color:var(--blue);padding:0 .4rem}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
  label{display:block;font-size:.82rem;font-weight:600;margin-bottom:.2rem}
  input,select{width:100%;padding:.5rem;border:1px solid #cbd5e1;border-radius:8px;font-size:.95rem}
  .full{grid-column:1/-1}
  .radios{display:flex;gap:1rem;flex-wrap:wrap;padding-top:.3rem}
  .radios label{font-weight:400;display:flex;gap:.3rem;align-items:center;margin:0}
  button{padding:.7rem 1.4rem;background:var(--blue);color:#fff;border:0;border-radius:8px;font-size:1rem;cursor:pointer}
  .geo{font-size:.8rem;color:#64748b;margin:.5rem 0}
  .ok{background:#dcfce7;color:#166534;padding:.8rem;border-radius:8px;margin-bottom:1rem;display:none}
  @media(max-width:560px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <strong>🧒 Ficha de Registro / Censo Infantil</strong>
  <span><a href="/registros">📋 Ver registros</a> &nbsp;·&nbsp; <a href="/logout">Salir</a></span>
</header>
<main>
  <div class="ok" id="ok">✅ Registro guardado correctamente.</div>
  <p class="geo" id="geo">📍 Ubicación: solicitando…</p>
  <form id="f">

    <fieldset>
      <legend>1. Datos Personales del Niño/a</legend>
      <div class="grid">
        <div class="full"><label>Nombres completos</label><input name="nombres"></div>
        <div class="full"><label>Apellidos completos</label><input name="apellidos"></div>
        <div><label>Fecha de nacimiento</label><input type="date" name="fecha_nacimiento"></div>
        <div><label>Documento de Identidad (C.I. / Pasaporte)</label><input name="documento"></div>
        <div><label>Edad (años)</label><input type="number" min="0" name="edad_anios"></div>
        <div><label>Edad (meses)</label><input type="number" min="0" max="11" name="edad_meses"></div>
        <div><label>Género</label><select name="genero"><option value="">—</option><option>Masculino</option><option>Femenino</option><option>Otro</option></select></div>
        <div><label>Nacionalidad</label><input name="nacionalidad"></div>
      </div>
    </fieldset>

    <fieldset>
      <legend>2. Vivienda y Ubicación</legend>
      <div class="grid">
        <div class="full"><label>Dirección de residencia actual</label><input name="direccion"></div>
        <div><label>Ciudad / Municipio</label><input name="ciudad"></div>
        <div><label>Estado / Provincia</label><input name="estado_provincia"></div>
        <div class="full"><label>Punto de referencia cercano</label><input name="punto_referencia"></div>
      </div>
    </fieldset>

    <fieldset>
      <legend>3. Representante Legal</legend>
      <div class="grid">
        <div class="full"><label>Nombre completo del representante</label><input name="rep_nombre"></div>
        <div><label>Parentesco</label><select name="parentesco"><option value="">—</option><option>Madre</option><option>Padre</option><option>Abuelo/a</option><option>Tutor legal</option></select></div>
        <div><label>Documento de Identidad</label><input name="rep_documento"></div>
        <div><label>Ocupación / Profesión</label><input name="rep_ocupacion"></div>
        <div><label>Teléfono principal</label><input name="tel_principal"></div>
        <div><label>Teléfono alternativo (emergencias)</label><input name="tel_alternativo"></div>
        <div><label>Correo electrónico</label><input type="email" name="correo"></div>
      </div>
    </fieldset>

    <fieldset>
      <legend>4. Salud y Nutrición</legend>
      <div class="grid">
        <div><label>Estatura (cm)</label><input type="number" step="0.1" name="estatura_cm"></div>
        <div><label>Peso (kg)</label><input type="number" step="0.1" name="peso_kg"></div>
        <div><label>Grupo sanguíneo / Factor RH</label><input name="grupo_sanguineo"></div>
        <div><label>Esquema de vacunación</label><select name="vacunacion"><option value="">—</option><option>Completo</option><option>Incompleto</option></select></div>
        <div><label>¿Alergias conocidas?</label><div class="radios"><label><input type="radio" name="alergia" value="Sí">Sí</label><label><input type="radio" name="alergia" value="No">No</label></div></div>
        <div><label>Especifique (medicamentos, alimentos…)</label><input name="alergia_detalle"></div>
        <div><label>¿Condición médica / enfermedad crónica?</label><div class="radios"><label><input type="radio" name="condicion_medica" value="Sí">Sí</label><label><input type="radio" name="condicion_medica" value="No">No</label></div></div>
        <div><label>Especifique</label><input name="condicion_detalle"></div>
        <div><label>¿Toma medicamento regularmente?</label><div class="radios"><label><input type="radio" name="medicamento" value="Sí">Sí</label><label><input type="radio" name="medicamento" value="No">No</label></div></div>
        <div><label>Especifique</label><input name="medicamento_detalle"></div>
      </div>
    </fieldset>

    <fieldset>
      <legend>5. Datos Educativos</legend>
      <div class="grid">
        <div><label>¿Asiste a institución educativa?</label><div class="radios"><label><input type="radio" name="asiste" value="Sí">Sí</label><label><input type="radio" name="asiste" value="No">No</label></div></div>
        <div><label>Nivel educativo actual</label><select name="nivel_educativo"><option value="">—</option><option>Maternal</option><option>Preescolar / Inicial</option><option>Primaria</option><option>Secundaria</option></select></div>
        <div><label>Grado o año que cursa</label><input name="grado"></div>
        <div><label>Nombre de la institución</label><input name="institucion"></div>
      </div>
    </fieldset>

    <input type="hidden" name="geo_lat"><input type="hidden" name="geo_lng"><input type="hidden" name="geo_accuracy">
    <button type="submit">💾 Guardar registro</button>
  </form>
</main>
<script>
  const f = document.getElementById('f');
  // Geolocalización como metadata (no obligatoria).
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        f.geo_lat.value = pos.coords.latitude;
        f.geo_lng.value = pos.coords.longitude;
        f.geo_accuracy.value = pos.coords.accuracy;
        document.getElementById('geo').textContent =
          `📍 Ubicación capturada: ${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)} (±${Math.round(pos.coords.accuracy)} m)`;
      },
      () => { document.getElementById('geo').textContent = '📍 Ubicación no disponible (registro continúa igual).'; }
    );
  } else { document.getElementById('geo').textContent = '📍 Geolocalización no soportada.'; }

  f.addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = Object.fromEntries(new FormData(f).entries());
    const r = await fetch('/api/registros', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data)
    });
    if (r.ok) {
      document.getElementById('ok').style.display = 'block';
      f.reset();
      window.scrollTo(0, 0);
    } else if (r.status === 401) {
      location.href = '/login';
    } else {
      alert('Error al guardar.');
    }
  });
</script>
</body>
</html>
