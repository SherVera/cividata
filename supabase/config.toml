# Supabase CLI — https://supabase.com/docs/guides/cli/config
# project_id: identificador local del proyecto (Docker/CLI). El ref remoto real
# lo pasan los workflows de deploy vía `--project-ref` desde el secret.

project_id = "cividata"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.migrations]
enabled = true

[studio]
enabled = true
port = 54323

[auth]
enabled = true

[storage]
enabled = true
